name: Daily Trending Publisher

on:
  schedule:
    - cron: '5 1 * * *'  # 每日 01:05 UTC = 台灣時間 09:05
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t daily-tasks:latest .

      - name: Run container
        env:
          LLM_PROVIDER: claude
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: ${{ github.repository }}
          TARGET_BRANCH: main
          MAX_REPOS: 5
          HOMEPAGE_REPO_COUNT: 5
          PATH_PREFIX: daily
          DATA_PREFIX: data
          TIMEZONE: Asia/Taipei
          TRENDING_DAYS: 1
          EXCLUDE_FORKS: 1
          SITE_NAME: GitHub 每日熱門精選
          SITE_DESCRIPTION: 每日精選 GitHub 新創建熱門專案，由 AI 生成繁體中文介紹。
          CLOUDFLARE_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'daily-githubrank' }}
          SITE_URL: ${{ vars.CLOUDFLARE_PAGES_URL || 'https://daily-githubrank.pages.dev' }}
          COMMIT_AUTHOR_NAME: DailyTasksBot
          COMMIT_AUTHOR_EMAIL: bot@example.com
        run: |
          docker run --rm \
            -e LLM_PROVIDER \
            -e ANTHROPIC_API_KEY \
            -e GITHUB_TOKEN \
            -e TARGET_REPO \
            -e TARGET_BRANCH \
            -e MAX_REPOS \
            -e HOMEPAGE_REPO_COUNT \
            -e PATH_PREFIX \
            -e DATA_PREFIX \
            -e TIMEZONE \
            -e TRENDING_DAYS \
            -e EXCLUDE_FORKS \
            -e SITE_NAME \
            -e SITE_DESCRIPTION \
            -e CLOUDFLARE_PAGES_PROJECT \
            -e SITE_URL \
            -e COMMIT_AUTHOR_NAME \
            -e COMMIT_AUTHOR_EMAIL \
            daily-tasks:latest
